<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSC — Student Registration</title>

    <!-- Google Fonts: Inter for body, Playfair Display for accents -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital@1&display=swap"
        rel="stylesheet">

    <!-- Bootstrap Icons for form icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="indexCSS.css">
</head>

<body>

    <!-- Header -->
    <header>
        <div class="header-content">
            <a href="../index.html" class="back-link"><i class="bi bi-arrow-left"></i> Back to MSC</a>
            <img src="../images/logo.png" alt="MSC Logo" class="form-logo">
            <h1>Join <em>MSC</em></h1>
            <p>Register to become a member of the Math & Science Club — INPT Rabat</p>
        </div>
    </header>

    <!-- Main Form -->
    <main>
        <form id="registrationForm" novalidate>

            <!-- Section 1: Profile Information -->
            <fieldset>
                <legend><i class="bi bi-person"></i> Profile Information</legend>

                <div class="form-row">
                    <label>
                        <span class="label-text">Full Name</span>
                        <input type="text" name="fullName" placeholder="e.g. Hassan Farsi" required>
                    </label>
                    <label>
                        <span class="label-text">Email</span>
                        <input type="email" name="email" placeholder="you@inpt.ac.ma" required>
                    </label>
                </div>

                <div class="form-row">
                    <label>
                        <span class="label-text">Password</span>
                        <input type="password" name="password" minlength="8" placeholder="Min 8 characters" required>
                    </label>
                    <label>
                        <span class="label-text">Phone Number</span>
                        <input type="tel" name="phone" placeholder="+212 6XXXXXXXX" required>
                    </label>
                </div>

                <div class="form-row">
                    <label>
                        <span class="label-text">Date of Birth</span>
                        <input type="date" name="dob" required>
                    </label>
                    <label>
                        <span class="label-text">Gender</span>
                        <select name="gender">
                            <option value="">-- Select --</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </label>
                </div>

                <label class="file-label">
                    <span class="label-text">Profile Picture</span>
                    <div class="file-upload-area">
                        <i class="bi bi-cloud-arrow-up"></i>
                        <span>Click to upload or drag & drop</span>
                        <input type="file" id="photo" name="photo" accept="image/*">
                    </div>
                </label>
                <img id="photoPreview" alt="Profile preview">
            </fieldset>

            <!-- Section 2: Academic Information -->
            <fieldset>
                <legend><i class="bi bi-mortarboard"></i> Academic Information</legend>

                <div class="form-row">
                    <label>
                        <span class="label-text">Student ID</span>
                        <input type="number" name="studentId" placeholder="e.g. 12345" required>
                    </label>
                    <label>
                        <span class="label-text">Sector</span>
                        <select name="department">
                            <option value="AMOA">AMOA</option>
                            <option value="ASEDS">ASEDS</option>
                            <option value="DATA">DATA</option>
                            <option value="ICCN">ICCN</option>
                            <option value="SESNUM">SESNUM</option>
                            <option value="SMART">SMART</option>
                            <option value="SUD" selected>SUD</option>
                        </select>
                    </label>
                </div>

                <label>
                    <span class="label-text">Cycle</span>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="cycle" value="engineering"> Engineering
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="cycle" value="master"> Master
                        </label>
                    </div>
                </label>

                <label>
                    <span class="label-text">Skills</span>
                    <div class="checkbox-group">
                        <label class="checkbox-option">
                            <input type="checkbox" name="skills" value="html"> HTML
                        </label>
                        <label class="checkbox-option">
                            <input type="checkbox" name="skills" value="css"> CSS
                        </label>
                        <label class="checkbox-option">
                            <input type="checkbox" name="skills" value="js"> JavaScript
                        </label>
                    </div>
                </label>

                <label>
                    <span class="label-text">Favorite Professor</span>
                    <select id="professor">
                        <option value="Hassan-Farsi" selected>Hassan Farsi</option>
                        <option value="Other professor">Other professor</option>
                        <option value="You">You</option>
                    </select>
                </label>

                <label>
                    <span class="label-text">Satisfaction with INPT</span>
                    <input type="range" min="1" max="10" value="7">
                </label>

                <label>
                    <span class="label-text">Additional Notes</span>
                    <textarea rows="4" placeholder="Anything else you'd like us to know..."></textarea>
                </label>
            </fieldset>

            <!-- Terms & Submit -->
            <div class="terms-section">
                <label class="checkbox-option terms-check">
                    <input type="checkbox" required>
                    I accept the <a href="#">terms and conditions</a>
                </label>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-submit">Register <i class="bi bi-arrow-right"></i></button>
                <button type="reset" class="btn-reset">Reset</button>
            </div>

        </form>
    </main>

    <!-- Footer -->
    <footer>
        <small>&copy; 2026 MSC — Math & Science Club, INPT Rabat</small>
    </footer>

    <script src="indexJS.js"></script>
</body>

</html>
